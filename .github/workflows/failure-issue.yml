name: CI Failure Tracker

on:
  workflow_run:
    workflows: ["CORE CI"]
    types: [completed]

permissions:
  issues: write

jobs:
  report:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            await github.rest.issues.create({
              ...context.repo,
              title: "CI failed: " + context.payload.workflow_run.name,
              body: "Workflow run: " + context.payload.workflow_run.html_url + "\n\nBranch: `" + (context.payload.workflow_run.head_branch || "unknown") + "`\nCommit: `" + (context.payload.workflow_run.head_sha || "unknown") + "`"
            })
